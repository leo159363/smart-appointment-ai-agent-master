name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality-checks:
    name: Basic quality checks
    runs-on: ubuntu-latest
    env:
      CI: "true"
      MODEL_PROVIDER: "azure"
      AZURE_OPENAI_API_KEY: "ci-dummy-key"
      AZURE_OPENAI_ENDPOINT: "https://ci-dummy.openai.azure.com/"
      AZURE_OPENAI_DEPLOYMENT: "ci-dummy-deployment"
      AZURE_OPENAI_VERSION: "2024-02-15-preview"
      AZURE_OPENAI_API_VERSION: "2024-02-15-preview"
      OPENAI_API_VERSION: "2024-02-15-preview"
      OPENAI_API_KEY: "ci-dummy-key"
      LLM_API_KEY: "ci-dummy-key"
      LLM_BASE_URL: "https://ci-dummy.openai.azure.com/"
      LLM_MODEL: "ci-dummy-model"
      EMBEDDING_PROVIDER: "openai-compatible"
      EMBEDDING_API_KEY: "ci-dummy-key"
      EMBEDDING_BASE_URL: "https://ci-dummy.openai.azure.com/"
      EMBEDDING_MODEL: "ci-dummy-embedding"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Prepare runtime directories
        run: |
          mkdir -p data
          mkdir -p exports

      - name: Import FastAPI app
        run: python -c "import app; print('app import ok')"

      - name: Collect pytest tests
        run: python -m pytest --collect-only

      - name: Check RAG export script syntax
        run: python -m py_compile scripts/export_tutoring_kb_for_modular_rag.py

      - name: Check RAG export script CLI
        run: python scripts/export_tutoring_kb_for_modular_rag.py --help
